<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title data-i18n="meta.titleHome">TRICK SHOT — 한 번의 슛, 완벽한 트릭샷</title>
  <meta name="description" content="튕기고, 휘고, 골인! 물리 기반 원터치 농구 트릭샷 게임 TRICK SHOT. App Store · Google Play · Steam에서 무료로 플레이하세요.">
  <meta name="theme-color" content="#7cb8e8">
  <link rel="icon" type="image/png" href="assets/game/app_icon.png">

  <!-- Open Graph -->
  <meta property="og:title" content="TRICK SHOT">
  <meta property="og:description" content="한 번의 슛, 완벽한 트릭샷. 물리 기반 원터치 농구 게임.">
  <meta property="og:type" content="website">

  <link rel="stylesheet" href="css/styles.css?v=110">
</head>
<body>

  <!-- ===================== Header ===================== -->
  <header class="site-header">
    <div class="container">
      <nav class="nav" aria-label="Main">
        <div class="nav__left">
          <a class="brand nav__reveal" href="#top" aria-label="TRICK SHOT home">
            <span class="brand__wordmark">
              <img src="assets/game/wordmark_trick.png" class="px" alt="TRICK" width="93" height="24">
              <img src="assets/game/wordmark_shot.png" class="px" alt="SHOT" width="77" height="24">
            </span>
          </a>

          <a class="header-version" href="patch-notes.html" aria-label="버전 정보 — 패치 노트 보기">
            <span class="header-version__icon" aria-hidden="true"></span>
            <span class="header-version__text">v 1.0.0</span>
          </a>
        </div>

        <div class="nav__right">
          <ul class="nav__links">
            <li><a class="nav-link--patch" href="patch-notes.html" data-i18n="nav.patch">패치 노트</a></li>
            <li><a href="#faq" data-i18n="nav.faq">FAQ</a></li>
            <li><a href="#contact" data-i18n="nav.contact">문의하기</a></li>
            <li><a href="#download" data-i18n="nav.download">다운로드</a></li>
          </ul>

          <span class="nav__divider" aria-hidden="true"></span>

          <div class="lang-toggle" role="group" aria-label="Language">
            <button type="button" data-lang-btn="ko" aria-pressed="true">KO</button>
            <button type="button" data-lang-btn="en" aria-pressed="false">EN</button>
          </div>

          <button class="nav__toggle" type="button" aria-label="메뉴 열기"
                  aria-expanded="false" aria-controls="mobile-menu"
                  data-i18n-attr="aria-label:nav.menuOpen">
            <span></span><span></span><span></span>
          </button>
        </div>
      </nav>
    </div>
  </header>

  <!-- mobile overlay menu -->
  <div class="mobile-menu" id="mobile-menu">
    <a class="web-btn web-btn--white" href="patch-notes.html">
      <span class="web-btn__bg" aria-hidden="true">
        <span class="web-btn__seg web-btn__seg--left"></span>
        <span class="web-btn__seg web-btn__seg--center"></span>
        <span class="web-btn__seg web-btn__seg--right"></span>
      </span>
      <span class="web-btn__label" data-i18n="nav.patch">패치 노트</span>
    </a>
    <a class="web-btn web-btn--white" href="#faq">
      <span class="web-btn__bg" aria-hidden="true">
        <span class="web-btn__seg web-btn__seg--left"></span>
        <span class="web-btn__seg web-btn__seg--center"></span>
        <span class="web-btn__seg web-btn__seg--right"></span>
      </span>
      <span class="web-btn__label" data-i18n="nav.faq">FAQ</span>
    </a>
    <a class="web-btn web-btn--white" href="#contact">
      <span class="web-btn__bg" aria-hidden="true">
        <span class="web-btn__seg web-btn__seg--left"></span>
        <span class="web-btn__seg web-btn__seg--center"></span>
        <span class="web-btn__seg web-btn__seg--right"></span>
      </span>
      <span class="web-btn__label" data-i18n="nav.contact">문의하기</span>
    </a>
    <a class="web-btn web-btn--orange" href="#download">
      <span class="web-btn__bg" aria-hidden="true">
        <span class="web-btn__seg web-btn__seg--left"></span>
        <span class="web-btn__seg web-btn__seg--center"></span>
        <span class="web-btn__seg web-btn__seg--right"></span>
      </span>
      <span class="web-btn__label" data-i18n="nav.download">다운로드</span>
    </a>
    <div class="mobile-menu__lang">
      <div class="lang-toggle" role="group" aria-label="Language">
        <button type="button" data-lang-btn="ko" aria-pressed="true">KO</button>
        <button type="button" data-lang-btn="en" aria-pressed="false">EN</button>
      </div>
    </div>
  </div>

  <main>
    <!-- ===================== Hero ===================== -->
    <section class="hero" id="top">
      <!-- version badge, pinned to the hero's top-left on mobile
           (the nav badge is hidden there instead) -->
      <a class="header-version hero-version" href="patch-notes.html" aria-label="버전 정보 — 패치 노트 보기">
        <span class="header-version__icon" aria-hidden="true"></span>
        <span class="header-version__text">v 1.0.0</span>
      </a>

      <!-- floating pixel decorations -->
      <canvas class="hero__birds" aria-hidden="true"></canvas>
      <img src="assets/game/ufo.png" class="hero__flyer hero__flyer--ufo px" alt="" aria-hidden="true">
      <img src="assets/game/jet.png" class="hero__flyer hero__flyer--jet px" alt="" aria-hidden="true">

      <img src="assets/game/goal.png" class="hero__goal px" alt="농구 골대와 공" width="383" height="223">

      <!-- wordmark — flexbox-centered in the full section -->
      <div class="hero__inner">
        <h1 class="wordmark">
          <img src="assets/game/wordmark_trick.png" class="wordmark__trick px" alt="TRICK" width="93" height="24">
          <img src="assets/game/wordmark_shot.png" class="wordmark__shot px" alt="SHOT" width="77" height="24">
        </h1>
      </div>

      <!-- sub text + CTA pinned to bottom of hero -->
      <div class="hero__foot">
        <p class="hero__sub" data-i18n-html="hero.sub">벽에 튕기고 장애물을 넘어, 불가능해 보이는 슛에 도전하세요!<br>짜릿한 트릭샷의 재미를 경험해 보세요.</p>
        <div class="hero__cta">
          <a class="web-btn web-btn--orange" href="#download">
            <span class="web-btn__bg" aria-hidden="true">
              <span class="web-btn__seg web-btn__seg--left"></span>
              <span class="web-btn__seg web-btn__seg--center"></span>
              <span class="web-btn__seg web-btn__seg--right"></span>
            </span>
            <span class="web-btn__label" data-i18n="hero.ctaDownload">지금 바로 다운로드</span>
          </a>
        </div>
      </div>

      <!-- pixel-art city skyline footer -->
      <div class="hero__skyline" aria-hidden="true"></div>
    </section>

    <!-- ===================== Features ===================== -->
    <section class="section" id="features">
      <div class="container">
        <div class="section-head reveal">
          <h2 data-i18n="features.title">단순하지만 깊이 있는 재미</h2>
          <p data-i18n-html="features.desc"></p>
        </div>

        <div class="shot-carousel reveal">
          <button class="shot-nav shot-nav--prev" type="button" aria-label="이전 화면" data-i18n-attr="aria-label:gallery.prev">
            <img src="assets/game/swipe_left.png" class="px" alt="" aria-hidden="true" width="11" height="17">
          </button>
          <div class="shot-viewport">
            <div class="shot-track" id="shot-track">
              <div class="shot-slide"><img src="assets/screenshots/shot_01.jpg" alt="" loading="lazy" width="1920" height="1354"></div>
              <div class="shot-slide"><img src="assets/screenshots/shot_02.jpg" alt="" loading="lazy" width="1920" height="1354"></div>
              <div class="shot-slide"><img src="assets/screenshots/shot_03.jpg" alt="" loading="lazy" width="1920" height="1354"></div>
              <div class="shot-slide"><img src="assets/screenshots/shot_04.jpg" alt="" loading="lazy" width="1920" height="1354"></div>
              <div class="shot-slide"><img src="assets/screenshots/shot_05.jpg" alt="" loading="lazy" width="1920" height="1354"></div>
              <div class="shot-slide"><img src="assets/screenshots/shot_06.jpg" alt="" loading="lazy" width="1920" height="1354"></div>
            </div>
          </div>
          <button class="shot-nav shot-nav--next" type="button" aria-label="다음 화면" data-i18n-attr="aria-label:gallery.next">
            <img src="assets/game/swipe_right.png" class="px" alt="" aria-hidden="true" width="11" height="17">
          </button>
        </div>
        <div class="shot-dots" id="shot-dots" role="tablist" aria-label="화면 선택"><!-- dots by main.js --></div>
      </div>
    </section>

    <!-- ===================== Maps ===================== -->
    <section class="section section--tint" id="stages">
      <!-- falling debris particles, generated by main.js, behind everything -->
      <div class="stages-particles" aria-hidden="true"></div>

      <div class="container">
        <div class="section-head reveal">
          <h2 data-i18n="stages.title">계속해서 추가되는 다양한 맵</h2>
          <p data-i18n-html="stages.desc"></p>
        </div>

        <div class="stages-placeholder reveal">
          <div class="stages-placeholder__stack">
            <img src="assets/game/locked_map.png" class="px stages-placeholder__img stages-placeholder__img--locked" alt="" aria-hidden="true" width="60" height="60">
            <img src="assets/game/coming_soon_map.png" class="px stages-placeholder__img stages-placeholder__img--soon" alt="" aria-hidden="true" width="60" height="60">
          </div>
        </div>
      </div>

      <!-- pixel-art skyline footer, tiled endlessly across the section width -->
      <div class="stages-skyline" aria-hidden="true"></div>
    </section>

    <!-- ===================== FAQ ===================== -->
    <section class="section" id="faq">
      <div class="container">
        <div class="section-head reveal">
          <h2 data-i18n="faq.title">자주 묻는 질문</h2>
          <p data-i18n="faq.desc"></p>
        </div>
        <div class="faq-list" id="faq-list"><!-- rendered by main.js --></div>
      </div>
    </section>

    <!-- ===================== Contact ===================== -->
    <section class="section section--tint" id="contact">
      <div class="container">
        <div class="section-head reveal">
          <h2 data-i18n="contact.title">문의하기</h2>
          <p data-i18n-html="contact.desc"></p>
        </div>
      </div>
    </section>

    <!-- ===================== Download ===================== -->
    <section class="section download" id="download">
      <div class="container">
        <div class="section-head reveal">
          <h2 data-i18n="download.title">지금 바로 다운로드하세요</h2>
          <p data-i18n="download.desc"></p>
        </div>

        <div class="store-grid">
          <a class="store-link reveal" href="#" aria-label="App Store">
            <img class="store-badge store-badge--ko" src="assets/store/appstore_ko.svg" alt="App Store에서 다운로드">
            <img class="store-badge store-badge--en" src="assets/store/appstore_en.svg" alt="Download on the App Store">
          </a>

          <a class="store-link reveal" href="#" aria-label="Google Play">
            <img class="store-badge store-badge--ko" src="assets/store/googleplay_ko.svg" alt="Google Play에서 다운로드">
            <img class="store-badge store-badge--en" src="assets/store/googleplay_en.svg" alt="Get it on Google Play">
          </a>
        </div>

        <p class="store-note" data-i18n="download.note"></p>
      </div>
    </section>
  </main>

  <!-- ===================== Footer ===================== -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <span class="footer-copy" data-i18n="footer.rights">© 2026 LaonPixels. All rights reserved.</span>
      <nav class="footer-links" aria-label="Legal">
        <a href="privacy.html" data-i18n="footer.linkPrivacy">개인정보 처리방침</a>
        <a href="terms.html" data-i18n="footer.linkTerms">이용약관</a>
        <a href="oss-license.html" data-i18n="footer.linkOss">오픈소스 라이센스</a>
      </nav>
    </div>
  </footer>

  <script src="js/translations.js?v=21"></script>
  <script src="js/i18n.js?v=2"></script>
  <script src="js/main.js?v=31"></script>
</body>
</html>
